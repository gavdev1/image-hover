<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom en Imagen con Hover</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Efecto Zoom en Imagen</h1>
        <p>Pasa el mouse sobre la imagen para ver el efecto de zoom</p>

        <div class="image-container" id="imageContainer">
            <img src="https://picsum.photos/800/600" alt="Imagen de ejemplo" id="zoomImage">
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
